<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MoneyView</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f2e8;
        --card: #fffdf8;
        --ink: #22201b;
        --muted: #746c61;
        --accent: #0f766e;
        --accent-soft: #d8f3ef;
        --line: #ddd3c5;
        --warn: #b45309;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.14), transparent 30%),
          linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
        color: var(--ink);
      }

      header,
      main {
        width: min(1100px, calc(100vw - 2rem));
        margin: 0 auto;
      }

      header {
        padding: 2rem 0 1rem;
      }

      nav {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      nav a {
        color: var(--ink);
        text-decoration: none;
        padding: 0.45rem 0.8rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.6);
      }

      h1,
      h2,
      h3 {
        margin: 0 0 0.8rem;
        font-weight: 600;
      }

      p {
        color: var(--muted);
      }

      .grid {
        display: grid;
        gap: 1rem;
      }

      .cards {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 1rem;
        box-shadow: 0 12px 32px rgba(34, 32, 27, 0.06);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 0.75rem;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }

      form.inline {
        display: inline;
      }

      input,
      select,
      button,
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 0.65rem 0.75rem;
        border: 1px solid var(--line);
        border-radius: 12px;
        font: inherit;
        background: #fff;
      }

      button {
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        border: none;
      }

      .stack {
        display: grid;
        gap: 0.75rem;
      }

      .mt-1 {
        margin-top: 1rem;
      }

      .mb-2 {
        margin-bottom: 2rem;
      }

      .two-col-wide {
        grid-template-columns: 2fr 1fr;
      }

      .two-col-even {
        grid-template-columns: 1fr 1fr;
      }

      .muted {
        color: var(--muted);
      }

      .warning {
        color: var(--warn);
      }

      .page-import {
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      .page-import p,
      .page-import li,
      .page-import label,
      .page-import input,
      .page-import select,
      .page-import button,
      .page-import textarea,
      .page-import table {
        font-family: inherit;
      }

      .import-lede {
        margin: 0;
        line-height: 1.55;
      }

      .import-note {
        margin: 0;
        padding: 0.8rem 0.95rem;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.72);
        line-height: 1.55;
      }

      .import-note strong {
        color: var(--ink);
      }

      .table-scroll {
        overflow-x: auto;
      }

      .compact-table {
        min-width: 100%;
        font-size: 0.92rem;
      }

      .compact-table th,
      .compact-table td {
        padding: 0.82rem 0.65rem;
        line-height: 1.45;
      }

      .nowrap {
        white-space: nowrap;
      }

      .wrap-cell {
        max-width: 24rem;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .preview-table {
        table-layout: fixed;
      }

      .preview-table th {
        font-size: 0.78rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .preview-table td {
        vertical-align: top;
      }

      .preview-table .description-col {
        width: 50%;
      }

      .preview-table .amount-col,
      .preview-table .status-col {
        width: 11%;
      }

      .preview-table .date-col,
      .preview-table .category-col {
        width: 14%;
      }

      .preview-merchant {
        margin: 0;
        color: var(--ink);
        font-weight: 600;
      }

      .preview-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin-top: 0.45rem;
      }

      .preview-meta span {
        display: inline-flex;
        align-items: center;
        padding: 0.18rem 0.45rem;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.08);
        color: var(--muted);
        font-size: 0.76rem;
      }

      .preview-row-review {
        background: rgba(180, 83, 9, 0.08);
      }

      .preview-row-ready {
        background: rgba(15, 118, 110, 0.04);
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 6.1rem;
        padding: 0.34rem 0.55rem;
        border-radius: 999px;
        font-size: 0.76rem;
        font-weight: 600;
        white-space: nowrap;
      }

      .status-ready {
        background: rgba(15, 118, 110, 0.12);
        color: var(--accent);
      }

      .status-review {
        background: rgba(180, 83, 9, 0.14);
        color: var(--warn);
      }

      .page-dashboard {
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      .page-dashboard p,
      .page-dashboard li,
      .page-dashboard label,
      .page-dashboard input,
      .page-dashboard select,
      .page-dashboard button,
      .page-dashboard textarea,
      .page-dashboard table {
        font-family: inherit;
      }

      .page-review {
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      .page-review p,
      .page-review li,
      .page-review label,
      .page-review input,
      .page-review select,
      .page-review button,
      .page-review textarea,
      .page-review table {
        font-family: inherit;
      }

      .filter-grid {
        display: grid;
        grid-template-columns: 1.1fr 1fr 1.4fr auto auto;
        gap: 0.75rem;
        align-items: end;
      }

      .review-list {
        display: grid;
        gap: 1rem;
      }

      .review-card {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(340px, 0.9fr);
        gap: 1rem;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1rem;
        background: rgba(255, 255, 255, 0.72);
      }

      .review-transaction {
        display: grid;
        gap: 0.55rem;
      }

      .review-amount {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
      }

      .review-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .review-badges span {
        display: inline-flex;
        align-items: center;
        padding: 0.22rem 0.55rem;
        border-radius: 999px;
        font-size: 0.78rem;
        background: rgba(15, 118, 110, 0.08);
        color: var(--muted);
      }

      .review-form {
        display: grid;
        gap: 0.7rem;
      }

      .pagination-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .pagination-links {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
      }

      .pagination-links a,
      .pagination-links span {
        padding: 0.45rem 0.75rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        text-decoration: none;
      }

      @media (max-width: 900px) {
        .filter-grid {
          grid-template-columns: 1fr;
        }

        .review-card {
          grid-template-columns: 1fr;
        }
      }

      .page-dashboard h2 {
        font-size: 1.1rem;
        letter-spacing: 0.01em;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
      }

      .hero-card {
        display: grid;
        gap: 0.55rem;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .hero-value {
        margin: 0;
        font-size: 2rem;
        font-weight: 700;
        line-height: 1.05;
        color: var(--ink);
      }

      .hero-value.negative {
        color: var(--warn);
      }

      .hero-detail {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .confidence-meter {
        height: 0.6rem;
        border-radius: 999px;
        background: rgba(34, 32, 27, 0.08);
        overflow: hidden;
      }

      .confidence-meter span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, #d97706 0%, #0f766e 100%);
        border-radius: inherit;
      }

      .metric-list {
        display: grid;
        gap: 0.45rem;
        margin: 0;
      }

      .metric-list p {
        margin: 0;
      }

      .alert-list {
        display: grid;
        gap: 0.75rem;
      }

      .alert-item {
        border-left: 4px solid var(--warn);
        background: rgba(180, 83, 9, 0.07);
        border-radius: 12px;
        padding: 0.85rem 0.95rem;
      }

      .alert-item p {
        margin: 0;
        line-height: 1.5;
      }

      .section-heading {
        margin: 0 0 0.75rem;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
      }

      .summary-card {
        display: grid;
        gap: 0.35rem;
      }

      .summary-label {
        margin: 0;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .summary-value {
        margin: 0;
        font-size: 1.45rem;
        font-weight: 700;
      }

      .summary-note {
        margin: 0;
        line-height: 1.45;
        color: var(--muted);
      }

      .table-compact th {
        font-size: 0.8rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .table-compact th,
      .table-compact td {
        padding: 0.7rem 0.65rem;
      }

      @media (max-width: 900px) {
        .hero-grid {
          grid-template-columns: 1fr;
        }
      }

      .amount-negative {
        color: var(--ink);
        font-weight: 600;
      }

      .amount-positive {
        color: var(--accent);
        font-weight: 600;
      }

      details.debug-panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.6);
        padding: 0.9rem 1rem;
      }

      details.debug-panel summary {
        cursor: pointer;
        font-weight: 600;
      }

      @media (max-width: 900px) {
        .preview-table {
          min-width: 760px;
        }

        .preview-table .description-col {
          width: 42%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>MoneyView</h1>
      <p>Generic local-first finance CSV dashboard.</p>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/import">Import</a>
        <a href="/review">Review Queue</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
